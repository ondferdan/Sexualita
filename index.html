      { veta: "\u201eNikdy nepo\u0161li intimn\xed fotky \u2014 ani partnerovi. Jednou poslan\xe9, nelze vz\xedt zp\u011bt.\u201c", kontext: "Prakticky a bez k\xe1z\xe1n\xed." }
    ],
    pozor: "V tomto v\u011bku je rodi\u010d pr\u016fvodce, ne hl\xedd\u010d. Pokud chce\u0161, aby se tv\xe9 d\xedt\u011b chovalo zodpov\u011bdn\u011b, mus\xed c\xedtit, \u017ee mu v\u011b\u0159\xed\u0161.",
    knihy: [
      { nazev: "Emily Nagoski: Jak funguje \u017eensk\xe1 sexualita", popis: "Pro star\u0161\xed d\xedvky a jejich maminky \u2014 pr\u016flomov\xe1." },
      { nazev: "The Teenage Brain (Frances Jensen)", popis: "Pro rodi\u010de \u2014 v\u011bda o mozku teenagera." }
    ],
    pracovni_list: "Pr\u016fvodce zdrav\xfdmi vztahy \u2014 kontroln\xed seznam sign\xe1l\u016f zdrav\xe9ho a nezdrav\xe9ho vztahu."
  }
};

var currentAge = null;
var currentTab = "jak";

function init() {
  var grid = document.getElementById("ageGrid");
  var keys = Object.keys(DATA);
  for (var i = 0; i < keys.length; i++) {
    (function(key) {
      var d = DATA[key];
      var btn = document.createElement("button");
      btn.className = "age-btn";
      btn.id = "age-" + key;
      btn.innerHTML = '<span>' + d.emoji + '</span><span>' + d.label + '</span>';
      btn.addEventListener("click", function() { selectAge(key); });
      grid.appendChild(btn);
    })(keys[i]);
  }
}

function selectAge(key) {
  // Remove active from all age buttons
  var btns = document.querySelectorAll(".age-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("on");
  // Activate clicked
  document.getElementById("age-" + key).classList.add("on");
  currentAge = key;
  currentTab = "jak";
  renderContent();
}

function selectTab(tab) {
  currentTab = tab;
  // Update tab buttons
  var tabs = document.querySelectorAll(".tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("on");
  document.getElementById("tab-" + tab).classList.add("on");
  // Update panels
  var panels = document.querySelectorAll(".panel");
  for (var i = 0; i < panels.length; i++) panels[i].classList.remove("on");
  document.getElementById("p-" + tab).classList.add("on");
}

function renderContent() {
  var el = document.getElementById("mainContent");
  var d = DATA[currentAge];

  var tabDefs = [
    { id: "jak",   icon: "💬", label: "Jak mluvit" },
    { id: "pozor", icon: "⚠️", label: "Pozor na" },
    { id: "knihy", icon: "📚", label: "Knihy" },
    { id: "list",  icon: "📄", label: "Pracovní list" }
  ];

  var vetaHTML = "";
  for (var i = 0; i < d.jak_mluvit.length; i++) {
    var v = d.jak_mluvit[i];
    vetaHTML += '<div class="veta"><div class="veta-q">' + escH(v.veta) + '</div><div class="veta-k">' + escH(v.kontext) + '</div></div>';
  }

  var knihyHTML = "";
  for (var i = 0; i < d.knihy.length; i++) {
    var k = d.knihy[i];
    knihyHTML += '<div class="kniha"><div class="kniha-ico">📖</div><div><div class="kniha-n">' + escH(k.nazev) + '</div><div class="kniha-p">' + escH(k.popis) + '</div></div></div>';
  }

  var tabsHTML = "";
  for (var i = 0; i < tabDefs.length; i++) {
    var t = tabDefs[i];
    var on = t.id === currentTab ? " on" : "";
    tabsHTML += '<button class="tab' + on + '" id="tab-' + t.id + '" onclick="selectTab(\'' + t.id + '\')"><span class="ti">' + t.icon + '</span><span>' + t.label + '</span></button>';
  }

  el.innerHTML =
    '<div class="fadein">' +
      '<div class="topic"><div class="lbl">Co dítě v tomto věku řeší</div><p>' + escH(d.co_resi) + '</p></div>' +
      '<div class="tabs">' + tabsHTML + '</div>' +
      '<div id="p-jak" class="panel' + (currentTab==="jak"?" on":"") + '">' + vetaHTML + '</div>' +
      '<div id="p-pozor" class="panel' + (currentTab==="pozor"?" on":"") + '">' +
        '<div class="pozor"><div class="pozor-h"><span>⚠️</span><div class="lbl">Na co si dát pozor</div></div><p>' + escH(d.pozor) + '</p></div>' +
      '</div>' +
      '<div id="p-knihy" class="panel' + (currentTab==="knihy"?" on":"") + '">' + knihyHTML + '</div>' +
      '<div id="p-list" class="panel' + (currentTab==="list"?" on":"") + '">' +
        '<div class="listcard"><div class="lbl">Pracovní list pro toto věkové pásmo</div><p>' + escH(d.pracovni_list) + '</p>' +
        '<div class="list-note">💡 Pracovní listy jsou dostupné u lektorky besedy nebo v tištěném setu po skončení programu.</div></div>' +
      '</div>' +
      '<div class="quote"><div class="lbl">Zapamatuj si</div><p>Na otázku dítěte není špatná odpověď. Horší než nedokonalá odpověď je ticho.</p></div>' +
    '</div>';

  // Scroll to content
  el.scrollIntoView({ behavior: "smooth", block: "start" });
}

function escH(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

// Run
init();

// Service worker
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
