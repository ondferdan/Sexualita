<style>
:root {

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cr);font-family:var(--sf);min-height:100dvh}

/* HEADER */
.hdr{background:linear-gradient(160deg,var(--g) 0%,var(--gd) 100%);

  text-align:center;position:relative;overflow:hidden}

  width:220px;height:220px;top:-70px;right:-60px}
.hdr-badge{display:inline-block;background:rgba(255,255,255,.1);
  border-radius:50px;padding:4px 16px;font-family:var(--ss);font-size:10px;
  font-weight:600;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.6);margin-bottom:14px}
.hdr h1{font-family:var(--sf);font-size:clamp(22px,5vw,28px);
  font-weight:400;color:#f5f0ea;letter-spacing:.5px}
.hdr p{margin-top:8px;font-family:var(--sf);font-style:italic;
  font-size:14px;color:rgba(245,240,234,.6)}

/* LAYOUT */
.wrap{max-width:680px;margin:0 auto;padding:20px 14px 60px}

/* CARDS */
.card{background:#fff;border-radius:16px;border:1px solid var(--bd);
  box-shadow:0 2px 16px rgba(0,0,0,.055);padding:20px;margin-bottom:14px}
.lbl{font-family:var(--ss);font-size:10px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;color:#b0a898;margin-bottom:14px}

/* AGE BUTTONS */
.age-grid{display:flex;flex-wrap:wrap;gap:8px}
.age-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;
  border-radius:50px;border:2px solid var(--bd);background:var(--cr);
  color:#4a3f35;cursor:pointer;font-family:var(--ss);font-size:14px;
  font-weight:400;transition:all .25s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;user-select:none}
.age-btn:active{transform:scale(.96)}
.age-btn.on{border-color:var(--g);background:var(--g);color:#f5f0ea;
  font-weight:600;box-shadow:0 4px 14px rgba(45,74,62,.3)}

/* TOPIC */
.topic{background:linear-gradient(135deg,var(--g) 0%,var(--gd) 100%);
  border-radius:16px;padding:20px 22px;margin-bottom:14px;
  color:#fff;position:relative;overflow:hidden}
.topic::after{content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.04);pointer-events:none}
.topic .lbl{color:rgba(255,255,255,.5);margin-bottom:10px}
.topic p{font-family:var(--sf);font-size:15px;line-height:1.75;color:rgba(255,255,255,.92)}

/* TABS */
.tabs{display:flex;gap:5px;background:#fff;border-radius:14px;
  border:1px solid var(--bd);padding:6px;margin-bottom:14px;
  box-shadow:0 2px 12px rgba(0,0,0,.05)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 4px;border-radius:10px;border:none;background:transparent;
  color:#9a9088;cursor:pointer;font-family:var(--ss);font-size:11px;
  font-weight:400;transition:all .2s;-webkit-tap-highlight-color:transparent;
  user-select:none;line-height:1.2}
.tab .ti{font-size:17px}
.tab:active{background:#f5f0ea}
.tab.on{background:var(--g);color:#fff;font-weight:600;
  box-shadow:0 2px 10px rgba(45,74,62,.25)}

/* PANELS */
.panel{display:none}
.panel.on{display:block}

/* SITUACE CARDS */
.sit{background:#fff;border-radius:14px;padding:16px 18px;
  margin-bottom:10px;border:1px solid var(--bd);
  border-left:3px solid var(--g);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.sit-trigger{font-family:var(--ss);font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--g);
  margin-bottom:6px}
.sit-q{font-family:var(--sf);font-style:italic;font-size:15px;
  color:#3a2010;line-height:1.6;margin-bottom:10px;
  padding:8px 12px;background:#f9f5f0;border-radius:8px}
.sit-a{font-family:var(--sf);font-size:14.5px;color:var(--tx);
  line-height:1.65;margin-bottom:8px}
.sit-note{font-family:var(--ss);font-size:12.5px;color:#9a9088;
  line-height:1.5;display:flex;gap:5px}
.sit-note::before{content:'→';flex-shrink:0}

  letter-spacing:2px;text-transform:uppercase;color:var(--mu);
  margin:18px 0 8px;padding-left:4px}

.pozor{background:#fff;border-radius:14px;padding:22px;
  border:1px solid var(--bd);border-left:3px solid var(--am);
  box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:10px}
.pozor-h{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.pozor-h .lbl{margin-bottom:0;color:var(--am)}
.pozor p{font-family:var(--sf);font-size:15px;line-height:1.8;color:#2a2018}

/* KNIHY */
.kniha{background:#fff;border-radius:14px;padding:14px 18px;
  margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;
  border:1px solid var(--bd);box-shadow:0 2px 10px rgba(0,0,0,.05)}

  background:linear-gradient(135deg,var(--g),var(--gd));
  display:flex;align-items:center;justify-content:center;font-size:20px}
.kniha-n{font-family:var(--sf);font-weight:600;font-size:14px;color:var(--tx);margin-bottom:4px}
.kniha-p{font-family:var(--ss);font-size:13px;color:var(--mu);line-height:1.55}

/* PRACOVNÍ LISTY */
.wsheet{background:#fff;border-radius:14px;padding:16px 18px;
  margin-bottom:10px;border:1px solid var(--bd);
  box-shadow:0 2px 10px rgba(0,0,0,.05);
  display:flex;align-items:flex-start;gap:14px}
.wsheet-ico{width:44px;height:44px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--am),#a06800);
  display:flex;align-items:center;justify-content:center;font-size:22px}
.wsheet-body{flex:1}
.wsheet-n{font-family:var(--sf);font-weight:600;font-size:14.5px;color:var(--tx);margin-bottom:3px}
.wsheet-p{font-family:var(--ss);font-size:13px;color:var(--mu);line-height:1.5;margin-bottom:10px}
.btn-print{display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;background:var(--g);color:#fff;
  border:none;border-radius:8px;cursor:pointer;
  font-family:var(--ss);font-size:13px;font-weight:600;
  -webkit-tap-highlight-color:transparent;transition:opacity .2s}
.btn-print:active{opacity:.8}

/* QUOTE */
.quote{background:linear-gradient(135deg,#fffaf4,var(--al));border-radius:14px;
  padding:20px 22px;margin-top:14px;border:1px solid #e8d8b8;text-align:center}

.quote p{font-family:var(--sf);font-style:italic;font-size:15px;line-height:1.75;color:#6a4010}

/* EMPTY */

  font-family:var(--sf);font-style:italic;font-size:15px;line-height:1.9}

footer{text-align:center;margin-top:36px;padding:16px;
  font-family:var(--ss);font-size:11px;color:#c8c0b8;
  border-top:1px solid var(--bd);letter-spacing:1px}

.fadein{animation:fu .35s cubic-bezier(.22,1,.36,1) both}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* PRINT SHEET (hidden, rendered in new tab) */
@media print{
  .hdr,.tabs,.age-grid,.card,.btn-print{display:none}
}
</style>
</head>

function openWorksheet(fn, title) {
  var content = fn();
  var w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><title>${title}</title><style>${PRINT_STYLES}</style></head><body><button onclick="window.print()" style="margin-bottom:20px;padding:10px 20px;background:#2d4a3e;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">🖨️ Vytisknout</button>${content}</body></html>`);
  w.document.close();
}

/* ═══════════════════════════════════════════════════ APP LOGIC */

var currentAge = null;
var currentTab = "situace";

function init() {
  var grid = document.getElementById("ageGrid");
  var keys = Object.keys(DATA);
  for (var i = 0; i < keys.length; i++) {
    (function(key) {
      var d = DATA[key];
      var btn = document.createElement("button");
      btn.className = "age-btn";
      btn.id = "age-" + key;
      btn.innerHTML = '<span>' + d.emoji + '</span><span>' + d.label + '</span>';
      btn.addEventListener("click", function() { selectAge(key); });
      grid.appendChild(btn);
    })(keys[i]);
  }
}

function selectAge(key) {
  document.querySelectorAll(".age-btn").forEach(function(b){ b.classList.remove("on"); });
  document.getElementById("age-" + key).classList.add("on");
  currentAge = key;
  currentTab = "situace";
  renderContent();
}

function selectTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(function(b){ b.classList.remove("on"); });
  document.getElementById("tab-" + tab).classList.add("on");
  document.querySelectorAll(".panel").forEach(function(p){ p.classList.remove("on"); });
  document.getElementById("p-" + tab).classList.add("on");
}

function escH(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderContent() {
  var el = document.getElementById("mainContent");
  var d = DATA[currentAge];

  var tabDefs = [
    { id:"situace", icon:"💬", label:"Situace" },
    { id:"pozor",   icon:"⚠️",  label:"Pozor na" },
    { id:"knihy",   icon:"📚", label:"Knihy" },
    { id:"listy",   icon:"📄", label:"Listy" }
  ];

  // Situace panel
  var sitHTML = "";
  for (var i = 0; i < d.situace.length; i++) {
    var s = d.situace[i];
    sitHTML += '<div class="sit">' +
      '<div class="sit-trigger">' + escH(s.trigger) + '</div>' +
      '<div class="sit-q">' + escH(s.dite) + '</div>' +
      '<div class="sit-a"><strong>Možná odpověď:</strong> ' + escH(s.odpoved) + '</div>' +
      '<div class="sit-note">' + escH(s.note) + '</div>' +
      '</div>';
  }

  // Pozor panel
  var pozorHTML = "";
  for (var i = 0; i < d.pozor.length; i++) {
    pozorHTML += '<div class="pozor"><div class="pozor-h"><span>⚠️</span><div class="lbl">Na co si dát pozor</div></div><p>' + escH(d.pozor[i]) + '</p></div>';
  }

  // Knihy panel
  var knihyHTML = "";
  for (var i = 0; i < d.knihy.length; i++) {
    var k = d.knihy[i];
    knihyHTML += '<div class="kniha"><div class="kniha-ico">📖</div><div><div class="kniha-n">' + escH(k.nazev) + '</div><div class="kniha-p">' + escH(k.popis) + '</div></div></div>';
  }

  // Pracovní listy panel
  var listyHTML = "";
  for (var i = 0; i < d.worksheets.length; i++) {
    var wIdx = i;
    var w = d.worksheets[i];
    listyHTML += '<div class="wsheet" id="ws-' + currentAge + '-' + i + '">' +
      '<div class="wsheet-ico">📄</div>' +
      '<div class="wsheet-body">' +
        '<div class="wsheet-n">' + escH(w.nazev) + '</div>' +
        '<div class="wsheet-p">' + escH(w.popis) + '</div>' +
        '<button class="btn-print" onclick="openWorksheet(DATA[\'' + currentAge + '\'].worksheets[' + wIdx + '].obsah, \'' + escH(w.nazev).replace(/'/g,"\\'") + '\')">📄 Otevřít a vytisknout</button>' +
      '</div>' +
    '</div>';
  }

  var tabsHTML = tabDefs.map(function(t) {
    var on = t.id === currentTab ? " on" : "";
    return '<button class="tab' + on + '" id="tab-' + t.id + '" onclick="selectTab(\'' + t.id + '\')"><span class="ti">' + t.icon + '</span><span>' + t.label + '</span></button>';
  }).join("");

  el.innerHTML =
    '<div class="fadein">' +
      '<div class="topic"><div class="lbl">Co dítě v tomto věku řeší</div><p>' + escH(d.co_resi) + '</p></div>' +
      '<div class="tabs">' + tabsHTML + '</div>' +
      '<div id="p-situace" class="panel' + (currentTab==="situace"?" on":"") + '">' + sitHTML + '</div>' +
      '<div id="p-pozor"   class="panel' + (currentTab==="pozor"  ?" on":"") + '">' + pozorHTML + '</div>' +
      '<div id="p-knihy"   class="panel' + (currentTab==="knihy"  ?" on":"") + '">' + knihyHTML + '</div>' +
      '<div id="p-listy"   class="panel' + (currentTab==="listy"  ?" on":"") + '">' + listyHTML + '</div>' +
      '<div class="quote"><div class="lbl">Zapamatuj si</div><p>Na otázku dítěte není špatná odpověď. Horší než nedokonalá odpověď je ticho.</p></div>' +
    '</div>';

  el.scrollIntoView({ behavior:"smooth", block:"start" });
}

init();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
